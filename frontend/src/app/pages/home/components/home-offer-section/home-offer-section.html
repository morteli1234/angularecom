<section class="relative left-1/2 right-1/2 w-screen font-sans text-stone-900 -translate-x-1/2">
  <div class="flex flex-col lg:flex-row p-20">
    <div class="flex-1 min-w-0 h-96">
      <img
        src="https://media.istockphoto.com/id/1502960762/vector/pop-summer-sale-design-image-illustration-of-summer-bursting-with-carbonation-light-blue.jpg?s=612x612&w=0&k=20&c=TSeL7nHfQ94dIQePkNc01AcFKu9JieDP09jASJuzFJU="
        alt="Summer sale banner"
        class="h-full w-full object-cover"
        loading="lazy"
        decoding="async"
      />
    </div>
    <div class="flex flex-col items-center gap-8 p-10 bg-slate-100 flex-1 min-w-0">
      <div
        class="flex h-[150px] w-[150px] items-center justify-center rounded-full bg-white/60 gap-8"
      >
        <article class="flex flex-col items-center gap-2">
          <p class="mt-3 space-y-2 text-sm text-slate-700 text-center">DISCOUNT</p>
          <h3
            class="font-['Great_Vibes'] italic text-3xl text-red-700 font-semibold whitespace-nowrap"
          >
            Summer Sale
          </h3>
          <p class="mt-3 space-y-2 text-sm text-slate-700 text-center">SALE 50%</p>
        </article>
      </div>
      <div class="flex flex-row flex-1 min-w-0 gap-4">
        <div>{{ days() }} Day</div>
        <div>{{ hours() }} Hour</div>
        <div>{{ minutes() }} Min</div>
        <div>{{ seconds() }} Sec</div>
      </div>
      <button
        class="text-lg font-semibold text-slate-900 underline underline-offset-8 decoration-red-500"
      >
        Shop Now
      </button>
    </div>
  </div>
</section>
