@if (categories$() | async; as categories) {
  <section [class]="'grid gap-2 bg-neutral-50 ' + categoryGridClasses(categories.length)">
    @for (category of categories; track category.key; let i = $index) {
      <a
        [routerLink]="category.route"
        [class]="
          'group relative flex flex-col justify-end overflow-hidden p-6 text-neutral-900 border border-neutral-200 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md '
          + categoryToneClasses(i)
          + ' '
          + categoryCardClasses(i, categories.length)
        "
      >
        <p class="text-xs font-semibold tracking-wide uppercase text-neutral-500">Category</p>
        <h2 [class]="i === 0 ? 'mt-2 text-5xl font-semibold text-neutral-900' : 'mt-2 text-4xl font-semibold text-neutral-900'">
          {{ category.name }}
        </h2>
        <p class="mt-2 max-w-md text-sm text-neutral-600">{{ category.description }}</p>
        <p class="mt-4 w-fit border-b border-black text-sm font-medium uppercase text-neutral-900">Shop now</p>
      </a>
    }
  </section>
} @else {
  <section class="grid grid-cols-1 gap-2 md:grid-cols-2 lg:grid-cols-4">
    @for (item of [1, 2, 3, 4]; track item) {
      <article class="min-h-56 p-6 bg-white border border-neutral-200 shadow-sm">
        <div class="h-3 w-20 animate-pulse rounded bg-slate-200"></div>
        <div class="mt-4 h-6 w-28 animate-pulse rounded bg-slate-200"></div>
        <div class="mt-3 h-4 w-36 animate-pulse rounded bg-slate-200"></div>
      </article>
    }
  </section>
}
