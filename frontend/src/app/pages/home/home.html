<app-home-categories-section [categories$]="categories$"></app-home-categories-section>
<div
  class="mx-auto flex flex-col gap-12 px-4 py-8 w-full max-w-7xl font-sans text-neutral-900 md:px-6 lg:px-8 lg:py-12"
>
  <section>
    <app-product-list
      [showTitle]="true"
      sectionTitle="Trending Products"
      [showStockControls]="false"
      [showCategoryTabs]="true"
      [useQueryParamCategory]="true"
      [useContainer]="false"
    ></app-product-list>
  </section>
  <app-home-spotlight-section></app-home-spotlight-section>
  <app-home-trend-columns-section></app-home-trend-columns-section>
  <app-home-instagallery-section></app-home-instagallery-section>
</div>
