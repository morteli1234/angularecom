<article class="flex h-full flex-col items-center font-sans">
  <div
    class="relative group h-[360px] rounded-xl bg-stone-100 p-4 shadow-sm transition hover:shadow-md overflow-hidden"
    (mouseleave)="showAddToCartFalse()"
  >
    <a [routerLink]="['/products', item().id]" class="block w-full">
      <img [src]="item().image" [alt]="item().title" class="max-h-full w-auto object-contain" />
    </a>
    <!-- Buttons -->
    <div class="absolute flex inset-x-0 bottom-4 justify-center gap-4">
      <a [routerLink]="['/products', item().id]">
        <button
          class="flex items-center justify-center w-8 h-8 rounded-full bg-stone-900 text-white text-xs font-semibold hover:bg-stone-700 opacity-0 group-hover:opacity-100 transition duration-300 cursor-pointer"
        >
          <a [routerLink]="['/products', item().id]"></a>
          <mat-icon>visibility</mat-icon>
        </button>
      </a>
      <button
        type="button"
        (click)="addToFavorites()"
        class="flex items-center justify-center w-8 h-8 rounded-full bg-stone-900 text-white text-xs font-semibold hover:bg-stone-700 opacity-0 group-hover:opacity-100 transition duration-300 group-hover:delay-150 cursor-pointer"
      >
        <mat-icon>favorite</mat-icon>
      </button>
      <button
        type="button"
        (click)="showAddToCartTrue()"
        class="flex items-center justify-center w-8 h-8 rounded-full bg-stone-900 text-white text-xs font-semibold hover:bg-stone-700 opacity-0 group-hover:opacity-100 transition duration-300 group-hover:delay-300 cursor-pointer"
      >
        <mat-icon>shopping_cart</mat-icon>
      </button>
      @if (showAddToCart() && item().quantity > 0) {
        <div
          class="absolute bottom-full mb-2 w-32 rounded-md bg-white border border-stone-200 shadow-lg p-2 text-center text-sm text-stone-700 opacity-0 group-hover:opacity-100 transition duration-300 hover:bg-stone-700 hover:text-white cursor-pointer active:scale-95"
          (click)="onAddToCart(item().id)"
        >
          Quick add!
        </div>
      } @else if (showAddToCart() && item().quantity === 0) {
        <div
          class="absolute bottom-full mb-2 w-32 rounded-md bg-white border border-stone-200 shadow-lg p-2 text-center text-sm text-stone-700 opacity-0 group-hover:opacity-100 transition duration-300 hover:bg-stone-700 hover:text-white cursor-not-allowed"
        >
          Out of stock
        </div>
      }
    </div>
  </div>

  <div class="flex flex-1 flex-col items-center gap-2 px-2 pt-4 text-center">
    <a [routerLink]="['/products', item().id]" class="block">
      <h3
        class="min-h-12 overflow-hidden text-ellipsis [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2] text-base font-medium text-stone-900 transition hover:text-stone-600"
      >
        {{ item().title }}
      </h3>
    </a>
    <p class="text-sm text-amber-500">★★★★★</p>
    <p class="text-lg font-semibold text-stone-900">{{ item().price | currency }}</p>

    @if (showStockControls()) {
      <p class="pt-2 text-xs font-medium text-stone-600">In stock: {{ item().quantity }}</p>

      <div class="mt-auto flex items-center gap-2 pt-2">
        <input
          type="number"
          min="1"
          [max]="item().quantity"
          [value]="quantityToAdd"
          (input)="onQuantityInput($event)"
          [disabled]="item().quantity === 0"
          class="w-20 border border-stone-200 bg-stone-50 px-2 py-1.5 text-xs text-stone-700 disabled:cursor-not-allowed disabled:bg-stone-100"
          aria-label="Quantity to add"
        />
        <button
          type="button"
          (click)="onAdd()"
          [disabled]="item().quantity === 0"
          class="bg-stone-900 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-stone-700 disabled:cursor-not-allowed disabled:bg-stone-300"
        >
          Add to cart
        </button>
      </div>
    }
  </div>
</article>
