<article class="flex h-full flex-col items-center font-sans">
  <a [routerLink]="['/products', item().id]" class="block w-full">
    <div
      class="flex h-[360px] items-center justify-center rounded-xl bg-stone-100 p-4 shadow-sm transition hover:shadow-md"
    >
      <img [src]="item().image" [alt]="item().title" class="max-h-full w-auto object-contain" />
    </div>
  </a>

  <div class="flex flex-1 flex-col items-center gap-2 px-2 pt-4 text-center">
    <a [routerLink]="['/products', item().id]" class="block">
      <h3
        class="min-h-12 overflow-hidden text-ellipsis [display:-webkit-box] [-webkit-box-orient:vertical] [-webkit-line-clamp:2] text-base font-medium text-stone-900 transition hover:text-stone-600"
      >
        {{ item().title }}
      </h3>
    </a>
    <p class="text-sm text-amber-500">★★★★★</p>
    <p class="text-lg font-semibold text-stone-900">{{ item().price | currency }}</p>

    @if (showStockControls()) {
      <p class="pt-2 text-xs font-medium text-stone-600">In stock: {{ item().quantity }}</p>

      <div class="mt-auto flex items-center gap-2 pt-2">
        <input
          type="number"
          min="1"
          [max]="item().quantity"
          [value]="quantityToAdd"
          (input)="onQuantityInput($event)"
          [disabled]="item().quantity === 0"
          class="w-20 border border-stone-200 bg-stone-50 px-2 py-1.5 text-xs text-stone-700 disabled:cursor-not-allowed disabled:bg-stone-100"
          aria-label="Quantity to add"
        />
        <button
          type="button"
          (click)="onAdd()"
          [disabled]="item().quantity === 0"
          class="bg-stone-900 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-stone-700 disabled:cursor-not-allowed disabled:bg-stone-300"
        >
          Add to cart
        </button>
      </div>
    }
  </div>
</article>
