<header class="border-b border-slate-200 bg-white/95 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-4 py-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-8">
      <a
        routerLink="/"
        class="text-xl font-semibold tracking-tight text-slate-900 transition hover:text-blue-600"
      >
        AngularEcom
      </a>
    </div>
    <div>
      <nav class="flex items-center gap-6 text-sm font-medium text-slate-700">
        @if (categories$() | async; as categories) {
          <div class="flex items-center gap-8">
            <a
              routerLink="/"
              class="capitalize transition hover:text-blue-600 hover:underline hover: underline-offset-5 hover:decoration-red-500 hover: decoration-2 4"
              routerLinkActive="text-blue-600 underline underline-offset-4 decoration-red-500 decoration-2 4"
              [routerLinkActiveOptions]="{
                paths: 'exact',
                queryParams: 'exact',
                matrixParams: 'ignored',
                fragment: 'ignored',
              }"
            >
              Home
            </a>
          </div>
          @for (category of categories; track category) {
            <a
              [routerLink]="['/products']"
              [queryParams]="{ category: category }"
              routerLinkActive="text-blue-600 underline underline-offset-4 decoration-red-500 decoration-2 4"
              [routerLinkActiveOptions]="{
                paths: 'exact',
                queryParams: 'exact',
                matrixParams: 'ignored',
                fragment: 'ignored',
              }"
              class="capitalize transition hover:text-blue-600 hover:underline hover:underline-offset-5 hover:decoration-red-500 hover:decoration-2 4"
            >
              {{ category }}
            </a>
          }
        }

        <!-- <a routerLink="/" class="transition hover:text-blue-600">Home</a>
        <a routerLink="/products" class="transition hover:text-blue-600">Products</a> -->
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <div class="relative">
        <input
          type="text"
          placeholder="Search products..."
          class="w-56 rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
          (input)="searchProducts($event.target.value)"
        />
        @if (filteredProducts() && filteredProducts().length > 0) {
          <ul
            class="absolute left-0 mt-0 w-full rounded-md bg-white border border-slate-300 shadow-lg z-10 h-auto max-h-60 overflow-y-auto"
          >
            @for (product of filteredProducts(); track product.id) {
              <li
                class="px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 cursor-pointer transition border-b border-slate-200 last:border-0"
                (click)="searchProducts('')"
              >
                <a [routerLink]="['/products', product.id]" class="block w-full">
                  {{ product.title }}</a
                >
              </li>
            }
          </ul>
        }
      </div>

      <button
        type="button"
        (click)="onCartClick()"
        class="flex items-center gap-2 rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 transition hover:border-slate-400 hover:bg-slate-50 hover:text-slate-900"
      >
        <mat-icon>shopping_cart</mat-icon>

        <span>Cart</span>
        <span
          class="inline-flex min-w-5 items-center justify-center rounded-full bg-slate-900 px-1.5 py-0.5 text-xs font-semibold leading-none text-white"
        >
          {{ (itemCount$ | async) ?? 0 }}
        </span>
      </button>
      <button>Login</button>
      <button>Register</button>
    </div>
  </div>
</header>
