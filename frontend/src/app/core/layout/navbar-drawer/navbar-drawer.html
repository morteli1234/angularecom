@if (open()) {
  <div class="fixed inset-0 z-50 bg-slate-900/45" (click)="onBackdropClick($event)">
    <aside
      class="ml-auto flex h-full w-full max-w-md flex-col border-l border-slate-200 bg-white shadow-[-10px_0_30px_rgba(15,23,42,0.18)]"
      role="dialog"
      aria-modal="true"
      aria-label="Shopping cart"
    >
      <header class="flex items-center justify-between border-b border-slate-200 p-4">
        <button
          type="button"
          class="cursor-pointer border-0 bg-transparent text-[1.75rem] leading-none text-slate-600"
          (click)="onClose()"
          aria-label="Close categories"
        >
          ×
        </button>
      </header>
      <div class="flex flex-col gap-4">
        <div class="flex flex-row gap-4">
          <favorite-button (favoritesClick)="onFavoritesClick()"></favorite-button>
          <cart-button (cartClick)="onCartClick()"></cart-button>
        </div>
        <div class="flex flex-col overflow-auto p-4 gap-8">
          @if (categories$() | async; as categories) {
            <a
              (click)="onClose()"
              routerLink="/"
              class="capitalize transition hover:decoration-red-500 hover: decoration-2 4 border-b border-slate-200 pl-1 pb-2"
              routerLinkActive="text-blue-600"
              [routerLinkActiveOptions]="{
                paths: 'exact',
                queryParams: 'exact',
                matrixParams: 'ignored',
                fragment: 'ignored',
              }"
            >
              <div class="text-xl">Home</div>
            </a>

            @for (category of categories; track category) {
              <a
                (click)="onClose()"
                [routerLink]="['/products']"
                [queryParams]="{ category: category }"
                routerLinkActive="text-blue-600  "
                [routerLinkActiveOptions]="{
                  paths: 'exact',
                  queryParams: 'exact',
                  matrixParams: 'ignored',
                  fragment: 'ignored',
                }"
                class="capitalize transition hover:decoration-red-500 hover:decoration-2 4 border-b-1 border-slate-200 pl-1 pb-2"
              >
                <div class="text-xl">{{ category }}</div>
              </a>
            }
          }
        </div>
      </div>
    </aside>
  </div>
}
