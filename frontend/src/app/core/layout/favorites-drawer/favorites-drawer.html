@if (open()) {
  <div class="fixed inset-0 z-50 bg-slate-900/45" (click)="onBackdropClick($event)">
    <aside
      class="ml-auto flex h-full w-full max-w-[300px] md:max-w-md flex-col border-l border-slate-200 bg-white shadow-[-10px_0_30px_rgba(15,23,42,0.18)]"
      role="dialog"
      aria-modal="true"
      aria-label="Favorites"
    >
      <header class="flex items-center justify-between border-b border-slate-200 p-4">
        <h2 class="m-0 text-lg font-bold text-slate-900">Favorites</h2>
        <button
          type="button"
          class="cursor-pointer border-0 bg-transparent text-[1.75rem] leading-none text-slate-600"
          (click)="onClose()"
          aria-label="Close favorites"
        >
          ×
        </button>
      </header>
      <div class="overflow-auto p-4"></div>
      @if (favoriteItems$ | async; as favorites) {
        @if (favorites.length === 0) {
          <p class="m-0 text-slate-500">You have no favorite products yet.</p>
        } @else {
          <ul class="m-0 flex list-none flex-col gap-3 p-0">
            @for (product of favorites; track product.productId) {
              <li
                class="grid grid-cols-[4rem_1fr] items-start gap-3 rounded-xl border border-slate-200 p-3"
              >
                <img [src]="product.image" [alt]="product.title" class="h-16 w-16 object-contain" />
                <div>
                  <p class="m-0 text-sm font-semibold text-slate-900">{{ product.title }}</p>
                  <p class="my-1 text-[0.8125rem] text-slate-600">
                    {{ product.price | currency }}
                  </p>
                </div>

                <button
                  type="button"
                  class="cursor-pointer rounded-[0.35rem] border border-slate-300 bg-white px-2.5 py-1.5 text-[0.8rem] font-bold text-slate-700 transition hover:bg-slate-50"
                  (click)="onRemove(product)"
                >
                  Remove
                </button>
              </li>
            }
          </ul>
        }
      }
    </aside>
  </div>
}
